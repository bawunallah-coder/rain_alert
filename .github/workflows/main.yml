name: Rain Alert

on:
  schedule:
    - cron: "0 8 * * *"    # 8 AM daily
    - cron: "0 16 * * *"   # 4 PM daily
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          LATITUDE: ${{ secrets.LATITUDE || '12.268583' }}
          LONGITUDE: ${{ secrets.LONGITUDE || '6.554311' }}
